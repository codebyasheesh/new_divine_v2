<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle -->
  <circle cx="50" cy="50" r="40" stroke="red" stroke-width="5" fill="none" stroke-dasharray="251.2" stroke-dashoffset="251.2">
    <animate attributeName="stroke-dashoffset" from="251.2" to="0" dur="1s" fill="freeze"></animate>
  </circle>

  <!-- Cross Line 1 -->
  <line x1="35" y1="35" x2="65" y2="65" stroke="red" stroke-width="5" stroke-dasharray="42.4" stroke-dashoffset="42.4">
    <animate attributeName="stroke-dashoffset" from="42.4" to="0" dur="0.5s" begin="1s" fill="freeze"></animate>
  </line>

  <!-- Cross Line 2 -->
  <line x1="65" y1="35" x2="35" y2="65" stroke="red" stroke-width="5" stroke-dasharray="42.4" stroke-dashoffset="42.4">
    <animate attributeName="stroke-dashoffset" from="42.4" to="0" dur="0.5s" begin="1.5s" fill="freeze"></animate>
  </line>
</svg>
